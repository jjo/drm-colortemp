name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libdrm-dev linux-libc-dev
    
    - name: Build binaries
      run: make
    
    - name: Test tool help
      run: |
        ./drm_colortemp -h
        ./drm_colortemp_daemon -h
    
    - name: Upload binaries
      uses: actions/upload-artifact@v4
      with:
        name: drm-colortemp-binaries
        path: |
          drm_colortemp
          drm_colortemp_daemon
        retention-days: 30
