name: Code Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libdrm-dev linux-libc-dev shellcheck
    
    - name: Check C code compilation warnings
      run: |
        gcc -Wall -Wextra -Werror -I/usr/include/libdrm -I/usr/include/drm -c drm_device.c -o /dev/null
        gcc -Wall -Wextra -Werror -I/usr/include/libdrm -I/usr/include/drm -c drm_colortemp.c -o /dev/null
        gcc -Wall -Wextra -Werror -I/usr/include/libdrm -I/usr/include/drm -c drm_colortemp_daemon_inotify.c -o /dev/null
    
    - name: Check shell scripts
      run: |
        shellcheck -x *.sh || true
    
    - name: Verify config file syntax
      run: |
        bash -n drm-colortemp.conf
