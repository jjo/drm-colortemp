# /etc/default/drm-colortemp.conf
# Configuration for DRM Color Temperature Daemon

# DRM device to use
# For a single card setup use DEVICE:
DEVICE="/dev/dri/card1"
# For multi-card setups use DEVICE1, DEVICE2, ... (up to DEVICE8).
# When any DEVICEn key is present it takes precedence for that slot.
# Example:
# DEVICE1="/dev/dri/card0"
# DEVICE2="/dev/dri/card1"

# Day temperature in Kelvin (1000-10000)
DAY_TEMP=6500

# Night temperature in Kelvin (1000-10000)
NIGHT_TEMP=3500

# Sunset hour (0-23)
SUNSET_HOUR=20

# Sunrise hour (0-23)
SUNRISE_HOUR=8

# TTY to monitor for automatic application
MONITOR_TTY=3

# TTY to force warm (night) temperature (Alt-F4)
WARM_TTY=4

# TTY to force cool (day) temperature (Alt-F5)
COOL_TTY=5

# Location (optional, for automatic solar calculation)
# Leave empty to use time-based calculation
# Format: latitude,longitude
# Example: LOCATION="40.7128,-74.0060"
LOCATION=""

# Check interval in seconds
CHECK_INTERVAL=1

# Enable verbose logging
VERBOSE=0

# Desktop notifications
# Notify user when it's time to apply color temperature
NOTIFY_ENABLED=0

# Which user to notify (username)
NOTIFY_USER=""

# Time to notify before sunset/sunrise (minutes)
NOTIFY_MINUTES_BEFORE=5
